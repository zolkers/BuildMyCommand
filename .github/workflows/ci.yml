name: CI

on:
  push:
    branches:
      - main
      - master
      - ddev
      - "feature/**"
      - "codex/**"
  pull_request:

jobs:
  check:
    name: Gradle check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
        shell: bash
      - name: Check
        run: ./gradlew clean check
        shell: bash
      - name: Build IntelliJ plugin
        run: ./gradlew :intellij-plugin:buildPlugin
        shell: bash
      - name: Verify IntelliJ IDEA Community compatibility
        if: matrix.os == 'ubuntu-latest'
        run: ./gradlew :intellij-plugin:runPluginVerifier
        shell: bash
