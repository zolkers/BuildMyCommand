name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  publish:
    name: Publish Maven Central
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
        shell: bash

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="$(./gradlew -q properties | awk -F': ' '/^version:/ { print $2; exit }')"
          if [ -z "$version" ]; then
            echo "Could not resolve Gradle project version" >&2
            exit 1
          fi
          if [[ "$version" == *"-SNAPSHOT" ]]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Version $version is a snapshot; skipping release."
            exit 0
          fi
          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/$tag" > /dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Tag $tag already exists; skipping release."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check
        if: steps.version.outputs.release == 'true'
        shell: bash
        run: ./gradlew clean check -PreleaseVersion="${{ steps.version.outputs.version }}"

      - name: Publish and release to Maven Central
        if: steps.version.outputs.release == 'true'
        shell: bash
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew publishAndReleaseToMavenCentral -PreleaseVersion="${{ steps.version.outputs.version }}"

      - name: Create and push release tag
        if: steps.version.outputs.release == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: steps.version.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
